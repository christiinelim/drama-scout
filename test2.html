<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeafletJS with Kakao Roadview</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=5b2b1b3076ed045ad1a4963a45b7608f"></script>
</head>
<body>
    <div id="map" style="height: 400px;"></div>
    <button id="show-roadview">Show Roadview</button>
    <script>
        var map = L.map('map').setView([37.5665, 126.9780], 13); // Initialize Leaflet map

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        var roadviewControl = L.Control.extend({
            options: {
                position: 'topright'
            },
            onAdd: function (map) {
                var container = L.DomUtil.create('div', 'leaflet-bar leaflet-control');
                container.innerHTML = '<button id="show-roadview">Show Roadview</button>';
                return container;
            }
        });

        map.addControl(new roadviewControl());

        // Initialize Kakao Roadview
        var roadview = new kakao.maps.Roadview();

        document.getElementById('show-roadview').onclick = function() {
            var center = map.getCenter();
            roadview.setPanoId(null, center.lng, center.lat); // Set position
            roadview.setViewpoint(panoId, 90, 0, 0); // Set direction (optional)
            roadview.open();
        };
    </script>
</body>
</html>
